<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STYLE BOOK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080b10;
  --card: #0f1419;
  --border: rgba(255,255,255,0.07);
  --mint: #6EFCD9;
  --pink: #FF6B9D;
  --gold: #FFD166;
  --purple: #C4B5FD;
  --text: #E8EAF0;
  --muted: #4a5568;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ── ANIMATED BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(110,252,217,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,107,157,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(196,181,253,0.04) 0%, transparent 70%);
  pointer-events: none;
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from { opacity: 0.6; }
  to   { opacity: 1; }
}

.wrap { position: relative; z-index: 1; }

/* ── HERO ── */
.hero {
  min-height: 100svh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center; padding: 2rem 1.5rem;
  position: relative;
}

.hero-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: rgba(110,252,217,0.08);
  border: 1px solid rgba(110,252,217,0.2);
  border-radius: 50px; padding: 0.4rem 1rem;
  font-size: 0.65rem; letter-spacing: 0.2em;
  color: var(--mint); text-transform: uppercase;
  margin-bottom: 2rem;
  animation: fadeUp 0.6s ease both;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--mint);
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5.5rem, 22vw, 10rem);
  line-height: 0.88; letter-spacing: 0.03em;
  animation: fadeUp 0.7s 0.1s ease both;
}
.hero-title .line1 { display: block; color: #fff; }
.hero-title .line2 {
  display: block;
  background: linear-gradient(90deg, var(--mint), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.hero-sub {
  margin-top: 1.5rem;
  font-size: 0.72rem; letter-spacing: 0.25em;
  color: var(--muted); text-transform: uppercase;
  animation: fadeUp 0.7s 0.25s ease both;
}

.hero-stats {
  display: flex; gap: 2rem; margin-top: 2.5rem;
  animation: fadeUp 0.7s 0.35s ease both;
}
.stat { text-align: center; }
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; color: var(--mint); line-height: 1;
}
.stat-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

.scroll-hint {
  position: absolute; bottom: 2rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  animation: fadeUp 0.7s 0.5s ease both;
}
.scroll-hint span { font-size: 0.6rem; letter-spacing: 0.3em; color: var(--muted); }
.scroll-bar {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--mint), transparent);
  animation: scrollAnim 1.8s ease-in-out infinite;
}
@keyframes scrollAnim { 0%,100%{transform:scaleY(0.3);opacity:0.3} 50%{transform:scaleY(1);opacity:1} }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TICKER ── */
.ticker-wrap {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.9rem 0; overflow: hidden;
}
.ticker-inner {
  display: flex; gap: 0; white-space: nowrap;
  animation: ticker 20s linear infinite;
}
.ticker-item {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 0 1.5rem;
  font-size: 0.68rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
.ticker-dot { color: var(--mint); font-size: 0.4rem; }
@keyframes ticker {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── SECTION ── */
.section { padding: 3.5rem 1.25rem; }

.sec-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 1.75rem;
  border-bottom: 1px solid var(--border); padding-bottom: 1rem;
}
.sec-label {
  font-size: 0.6rem; letter-spacing: 0.3em;
  color: var(--mint); text-transform: uppercase; margin-bottom: 0.3rem;
}
.sec-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem; letter-spacing: 0.05em; line-height: 1;
}
.sec-right { font-size: 0.65rem; color: var(--muted); text-align: right; line-height: 1.6; }

/* ── COMBO CARDS ── */
.cards { display: flex; flex-direction: column; gap: 1rem; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px; overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s;
  animation: fadeUp 0.5s ease both;
}
.card:active { transform: scale(0.99); }

.card-header {
  padding: 1.25rem 1.25rem 0;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.card-num {
  font-size: 0.6rem; letter-spacing: 0.3em;
  color: var(--mint); text-transform: uppercase;
}
.card-occasion-pill {
  font-size: 0.6rem; letter-spacing: 0.1em;
  padding: 0.3rem 0.75rem; border-radius: 30px;
  border: 1px solid rgba(110,252,217,0.18);
  color: var(--mint); text-transform: uppercase; white-space: nowrap;
}
.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 0.04em;
  padding: 0.3rem 1.25rem 0;
}

.card-visual {
  margin: 1rem 1.25rem;
  border-radius: 12px; height: 130px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.card-visual svg { position: relative; z-index: 2; }
.visual-glow {
  position: absolute; inset: 0;
  border-radius: 12px;
}

.card-pieces {
  padding: 0 1.25rem 1.25rem;
}
.divider { height: 1px; background: var(--border); margin-bottom: 1rem; }

.piece {
  display: flex; gap: 0.75rem; align-items: flex-start;
  margin-bottom: 0.6rem;
}
.piece:last-child { margin-bottom: 0; }
.piece-lbl {
  font-size: 0.58rem; letter-spacing: 0.15em;
  color: var(--muted); text-transform: uppercase;
  min-width: 42px; padding-top: 0.1rem; flex-shrink: 0;
}
.piece-val { font-size: 0.8rem; font-weight: 500; line-height: 1.5; }

.swatches { display: flex; gap: 0.4rem; margin-top: 1rem; }
.sw {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* ── RULES ── */
.rules { display: flex; flex-direction: column; gap: 0.75rem; }

.rule {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 1.1rem 1.25rem;
  display: flex; align-items: flex-start; gap: 1rem;
  animation: fadeUp 0.5s ease both;
}
.rule-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(110,252,217,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.rule-body {}
.rule-num { font-size: 0.58rem; color: var(--mint); letter-spacing: 0.25em; margin-bottom: 0.3rem; }
.rule-text { font-size: 0.82rem; line-height: 1.55; }

/* ── FOOTER ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 2.5rem 1.5rem; text-align: center;
}
.footer-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem; letter-spacing: 0.08em;
  background: linear-gradient(90deg, var(--mint), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.footer-note {
  font-size: 0.62rem; letter-spacing: 0.2em;
  color: var(--muted); margin-top: 0.5rem; text-transform: uppercase;
}

/* ── FLOATING ORBS ── */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(60px); pointer-events: none; z-index: 0;
  animation: orbFloat ease-in-out infinite alternate;
}
.orb1 { width:200px;height:200px; top:-50px; right:-50px; background:rgba(110,252,217,0.07); animation-duration:7s; }
.orb2 { width:150px;height:150px; bottom:20%; left:-60px; background:rgba(255,107,157,0.06); animation-duration:9s; animation-delay:-3s; }
.orb3 { width:120px;height:120px; top:40%; right:-30px; background:rgba(196,181,253,0.06); animation-duration:11s; animation-delay:-6s; }
@keyframes orbFloat {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-30px) scale(1.1); }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">

<!-- HERO -->
<section class="hero">
  <div class="hero-badge"><div class="badge-dot"></div>Personal Style Guide 2025</div>
  <div class="hero-title">
    <span class="line1">STYLE</span>
    <span class="line2">BOOK</span>
  </div>
  <p class="hero-sub">5 Premium Outfits &middot; Rules to Live By</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num">5</div><div class="stat-label">Combos</div></div>
    <div class="stat"><div class="stat-num">5</div><div class="stat-label">Rules</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">Max Colors</div></div>
  </div>
  <div class="scroll-hint"><span>Scroll</span><div class="scroll-bar"></div></div>
</section>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-inner" id="ticker"></div>
</div>

<!-- COMBOS -->
<section class="section">
  <div class="sec-header">
    <div>
      <div class="sec-label">01 — Outfits</div>
      <div class="sec-title">THE COMBOS</div>
    </div>
    <div class="sec-right">Tap to<br>explore</div>
  </div>
  <div class="cards" id="cards"></div>
</section>

<!-- RULES -->
<section class="section" style="padding-top:0">
  <div class="sec-header">
    <div>
      <div class="sec-label">02 — Principles</div>
      <div class="sec-title">THE RULES</div>
    </div>
    <div class="sec-right">Non-<br>negotiable</div>
  </div>
  <div class="rules" id="rules"></div>
</section>

<footer class="footer">
  <div class="footer-logo">STYLE BOOK</div>
  <div class="footer-note">Fit first. Always.</div>
</footer>

</div><!-- .wrap -->

<script>
const combos = [
  {
    num:"01", name:"Best Overall",
    top:"White plain t-shirt", layer:"Beige/cream overshirt or jacket",
    pants:"Dark blue slim-fit jeans", shoes:"Clean white sneakers",
    occasion:"Daily Wear / Casual",
    colors:["#FFFFFF","#D4C5A9","#1A2E4A","#F5F5F0"],
    accentColor:"#6EFCD9",
    bgFrom:"rgba(110,252,217,0.07)", bgTo:"rgba(212,197,169,0.05)"
  },
  {
    num:"02", name:"Clean & Mature",
    top:"Black or dark navy plain shirt", layer:null,
    pants:"Light grey tapered trousers", shoes:"Black sneakers or loafers",
    occasion:"Semi-formal / Meetings",
    colors:["#1a1a1a","#0d1b2a","#d0d0d0","#111111"],
    accentColor:"#FF6B9D",
    bgFrom:"rgba(255,107,157,0.07)", bgTo:"rgba(26,26,26,0.08)"
  },
  {
    num:"03", name:"Street Style",
    top:"Olive green t-shirt", layer:null,
    pants:"Black tapered cargos", shoes:"White or grey sneakers",
    occasion:"Casual / Hangout",
    colors:["#6B7C45","#111111","#E8E8E8","#888888"],
    accentColor:"#FFD166",
    bgFrom:"rgba(255,209,102,0.07)", bgTo:"rgba(107,124,69,0.08)"
  },
  {
    num:"04", name:"Minimal Model Look",
    top:"Beige or off-white t-shirt", layer:null,
    pants:"Black straight-fit trousers", shoes:"White sneakers",
    occasion:"Clean Aesthetic / Photos",
    colors:["#EDE8D9","#1a1a1a","#FFFFFF","#C4B89A"],
    accentColor:"#C4B5FD",
    bgFrom:"rgba(196,181,253,0.07)", bgTo:"rgba(237,232,217,0.05)"
  },
  {
    num:"05", name:"Date Outfit",
    top:"Light blue or white shirt", layer:null,
    pants:"Dark jeans or chinos", shoes:"White sneakers or brown loafers",
    occasion:"Date / Special Outing",
    colors:["#A8C8E8","#FFFFFF","#2A2A3A","#8B6914"],
    accentColor:"#FF6B9D",
    bgFrom:"rgba(168,200,232,0.1)", bgTo:"rgba(255,107,157,0.05)"
  }
];

const rules = [
  { icon:"👔", text:"Fit is more important than brand" },
  { icon:"🎨", text:"Maximum 3 colors per outfit" },
  { icon:"✨", text:"Always keep shoes clean" },
  { icon:"🚫", text:"Avoid loud prints" },
  { icon:"💇", text:"Match hairstyle — messy hair works best with clean outfits" }
];

// Mannequin builder
function mannequin(c, accent) {
  const top = c[0], pants = c[2], shoes = c[3];
  return `<svg width="72" height="148" viewBox="0 0 72 148" fill="none">
    <circle cx="36" cy="16" r="12" fill="#C9A882"/>
    <rect x="32" y="27" width="8" height="7" rx="1" fill="#C9A882"/>
    <path d="M20 36 L16 52 L16 84 L56 84 L56 52 L52 36 Z" fill="${top}" fill-opacity="0.95"/>
    <line x1="16" y1="84" x2="56" y2="84" stroke="${accent}" stroke-width="0.8" opacity="0.7"/>
    <path d="M20 38 L9 72 L14 73 L24 42" fill="${top}" fill-opacity="0.8"/>
    <path d="M52 38 L63 72 L58 73 L48 42" fill="${top}" fill-opacity="0.8"/>
    <ellipse cx="10" cy="73" rx="5" ry="3.5" fill="#C9A882"/>
    <ellipse cx="62" cy="73" rx="5" ry="3.5" fill="#C9A882"/>
    <rect x="16" y="83" width="40" height="4" rx="1" fill="rgba(0,0,0,0.35)"/>
    <path d="M16 87 L16 132 L34 132 L36 106 L38 132 L56 132 L56 87 Z" fill="${pants}" fill-opacity="0.95"/>
    <ellipse cx="26" cy="138" rx="11" ry="5" fill="${shoes}" fill-opacity="0.95"/>
    <ellipse cx="46" cy="138" rx="11" ry="5" fill="${shoes}" fill-opacity="0.95"/>
    <ellipse cx="22" cy="136" rx="4" ry="1.8" fill="rgba(255,255,255,0.18)"/>
    <ellipse cx="42" cy="136" rx="4" ry="1.8" fill="rgba(255,255,255,0.18)"/>
  </svg>`;
}

// Build ticker
const tickerRules = [...rules,...rules,...rules];
const tickerEl = document.getElementById('ticker');
tickerRules.forEach(r => {
  const d = document.createElement('div');
  d.className = 'ticker-item';
  d.innerHTML = `<span class="ticker-dot">&#9670;</span>${r.text}`;
  tickerEl.appendChild(d);
});

// Build cards
const cardsEl = document.getElementById('cards');
combos.forEach((c, i) => {
  const pieces = [
    { l:'TOP', v: c.top },
    c.layer ? { l:'LAYER', v: c.layer } : null,
    { l:'PANTS', v: c.pants },
    { l:'SHOES', v: c.shoes },
  ].filter(Boolean);

  const pHTML = pieces.map(p =>
    `<div class="piece"><span class="piece-lbl">${p.l}</span><span class="piece-val">${p.v}</span></div>`
  ).join('');

  const swHTML = c.colors.map(col =>
    `<div class="sw" style="background:${col}"></div>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = i * 0.08 + 's';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-num">COMBO ${c.num}</div>
      <div class="card-occasion-pill">${c.occasion}</div>
    </div>
    <div class="card-name">${c.name.toUpperCase()}</div>
    <div class="card-visual">
      <div class="visual-glow" style="background:radial-gradient(ellipse at center, ${c.bgFrom}, ${c.bgTo}, transparent)"></div>
      ${mannequin(c.colors, c.accentColor)}
    </div>
    <div class="card-pieces">
      <div class="divider"></div>
      ${pHTML}
      <div class="swatches">${swHTML}</div>
    </div>
  `;
  cardsEl.appendChild(card);
});

// Build rules
const rulesEl = document.getElementById('rules');
rules.forEach((r, i) => {
  const el = document.createElement('div');
  el.className = 'rule';
  el.style.animationDelay = i * 0.07 + 's';
  el.innerHTML = `
    <div class="rule-icon">${r.icon}</div>
    <div class="rule-body">
      <div class="rule-num">RULE 0${i+1}</div>
      <div class="rule-text">${r.text}</div>
    </div>
  `;
  rulesEl.appendChild(el);
});
</script>
</body>
  </html>
